<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSearch - Movie Discovery App</title>
    <link rel="stylesheet" href="style.css">
    <!-- Apply theme immediately before rendering to prevent flash -->
    <script>
        (function() {
            const isDark = localStorage.getItem('darkMode') === 'true';
            if (isDark) {
                document.documentElement.style.colorScheme = 'dark';
            }
        })();
    </script>
</head>
<body>
    <!-- Theme Toggle Button -->
    <div class="theme-toggle-container">
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
            <span class="theme-icon">🌙</span>
        </button>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="logo">🎬 CineSearch</h1>
            <p class="subtitle">Discover Your Next Favorite Movie</p>
        </header>

        <!-- Navigation Tabs -->
        <nav class="nav-tabs">
            <button class="nav-tab active" data-tab="search">
                Search
            </button>
            <button class="nav-tab" data-tab="favorites">
                ❤️ Favorites (<span id="favCount">0</span>)
            </button>
        </nav>

        <!-- Search Section -->
        <section class="search-section" id="searchTab">
            <div class="search-container">
                <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="Search movies, TV shows..."
                    autocomplete="off"
                >
                <button id="searchBtn" class="search-btn">Search</button>
            </div>

            <!-- Filter Options -->
            <div class="filters">
                <label for="typeFilter">Type:</label>
                <select id="typeFilter" class="filter-select">
                    <option value="">All Types</option>
                    <option value="movie">Movie</option>
                    <option value="series">Series</option>
                    <option value="episode">Episode</option>
                </select>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message"></div>

            <!-- Loading Spinner -->
            <div id="loadingSpinner" class="loading-spinner hidden">
                <div class="spinner"></div>
                <p>Searching for movies...</p>
            </div>

            <!-- Initial Content Section -->
            <div id="initialContent" class="initial-content">
                <h2 id="initialTitle" class="initial-title"></h2>
                <div id="initialGrid" class="movies-grid"></div>
            </div>

            <!-- Results Grid -->
            <div id="moviesGrid" class="movies-grid"></div>

            <!-- Pagination -->
            <div id="paginationContainer" class="pagination-container hidden">
                <button id="prevBtn" class="pagination-btn">← Previous</button>
                <span id="pageInfo" class="page-info"></span>
                <button id="nextBtn" class="pagination-btn">Next →</button>
            </div>
        </section>

        <!-- Favorites Section -->
        <section class="favorites-section hidden" id="favoritesTab">
            <div id="favoritesGrid" class="movies-grid"></div>
            <div id="emptyFavorites" class="empty-state hidden">
                <p>No favorites yet. Add movies to your favorites!</p>
            </div>
        </section>
    </div>

    <!-- Movie Details Modal -->
    <div id="movieModal" class="modal hidden">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-body">
                <div class="modal-poster">
                    <img id="modalPoster" src="" alt="Movie Poster">
                </div>
                <div class="modal-details">
                    <h2 id="modalTitle"></h2>
                    <div class="modal-meta">
                        <p><span class="label">Year:</span> <span id="modalYear"></span></p>
                        <p><span class="label">Type:</span> <span id="modalType"></span></p>
                        <p><span class="label">Runtime:</span> <span id="modalRuntime"></span></p>
                        <p><span class="label">Genre:</span> <span id="modalGenre"></span></p>
                        <p><span class="label">Director:</span> <span id="modalDirector"></span></p>
                        <p><span class="label">IMDB Rating:</span> <span id="modalRating" class="rating"></span></p>
                    </div>
                    <div class="modal-plot">
                        <h3>Plot</h3>
                        <p id="modalPlot"></p>
                    </div>
                    <button id="modalFavBtn" class="modal-fav-btn">♡ Add to Favorites</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
